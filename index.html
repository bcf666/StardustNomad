<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星尘牧歌 | Stardust Nomad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }

        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }

        #crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }

        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px;
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .hotbar-slot {
            width: 50px;
            height: 50px;
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid rgba(100, 100, 100, 0.5);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .hotbar-slot.selected {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .hotbar-slot .item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            color: #fff;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
        }

        .slot-number {
            position: absolute;
            top: 2px;
            left: 4px;
            color: #888;
            font-size: 10px;
        }

        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
        }

        #stats div {
            margin-bottom: 5px;
        }

        #coords {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
            text-align: right;
        }

        /* Main Menu */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 100;
        }

        #main-menu h1 {
            font-size: 72px;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(100, 150, 255, 0.5);
        }

        #main-menu h2 {
            font-size: 18px;
            font-weight: 300;
            color: #8ab;
            margin-bottom: 60px;
            letter-spacing: 4px;
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 15px 60px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.6);
            transform: scale(1.05);
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 200;
        }

        #loading-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        #loading-progress {
            height: 100%;
            background: #4af;
            width: 0%;
            transition: width 0.3s;
        }

        /* Build Menu */
        #build-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            display: none;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            pointer-events: auto;
        }

        #build-menu h3 {
            color: #fff;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .build-category {
            margin-bottom: 15px;
        }

        .build-category h4 {
            color: #8ab;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .build-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .build-item {
            width: 60px;
            height: 60px;
            background: rgba(50, 50, 60, 0.8);
            border: 2px solid rgba(100, 100, 100, 0.5);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .build-item:hover {
            border-color: #fff;
            transform: scale(1.1);
        }

        .build-item span {
            color: #fff;
            font-size: 10px;
            margin-top: 4px;
            text-align: center;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #888;
            font-size: 24px;
            cursor: pointer;
            pointer-events: auto;
        }

        .close-btn:hover {
            color: #fff;
        }

        /* Ship Build Mode */
        #ship-build-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            pointer-events: auto;
        }

        #ship-stats {
            position: absolute;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
        }

        #ship-stats div {
            margin: 5px 0;
        }

        .stat-bar {
            width: 150px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            display: inline-block;
            vertical-align: middle;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .stat-mass { background: #f55; }
        .stat-thrust { background: #5f5; }
        .stat-power { background: #ff5; }

        /* Messages */
        #message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        #message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Loading Screen -->
        <div id="loading">
            <div>正在加载星尘牧歌...</div>
            <div id="loading-bar">
                <div id="loading-progress"></div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" style="display: none;">
            <h1>星尘牧歌</h1>
            <h2>STARDUST NOMAD</h2>
            <button class="menu-btn" id="btn-new-game">开始新游戏</button>
            <button class="menu-btn" id="btn-continue">继续游戏</button>
            <button class="menu-btn" id="btn-settings">设置</button>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div id="crosshair"></div>

            <div id="stats">
                <div id="health">❤ 生命: 100/100</div>
                <div id="oxygen">🫁 氧气: 100/100</div>
                <div id="temperature">🌡️ 温度: 20°C</div>
            </div>

            <div id="coords">
                <div id="position">X: 0 Y: 0 Z: 0</div>
                <div id="mode">模式: 探索</div>
            </div>

            <div id="hotbar"></div>
        </div>

        <!-- Build Menu -->
        <div id="build-menu">
            <span class="close-btn" id="close-build">&times;</span>
            <h3>建造菜单</h3>
            <div id="build-categories"></div>
        </div>

        <!-- Ship Build Overlay -->
        <div id="ship-build-overlay">
            <div id="ship-stats">
                <div>🚀 飞船状态</div>
                <div>质量: <span id="ship-mass">0</span></div>
                <div>推力: <span id="ship-thrust">0</span></div>
                <div>能源: <span id="ship-power">0</span></div>
                <div style="margin-top: 10px;">按 E 放置 | Q 删除 | ESC 退出</div>
            </div>
        </div>

        <!-- Message -->
        <div id="message"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
