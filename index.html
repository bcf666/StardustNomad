<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星尘牧歌 - StardustNomad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        canvas {
            display: block;
        }
        /* HUD Styles */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }
        #hud.active {
            display: block;
        }
        .hud-top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .hud-top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            text-align: right;
        }
        .hud-bottom {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
        }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        .crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }
        .crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }
        .hotbar {
            display: flex;
            gap: 4px;
            justify-content: center;
        }
        .hotbar-slot {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .hotbar-slot.selected {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .hotbar-slot .item-count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 12px;
            color: #fff;
        }
        .stat-bar {
            width: 150px;
            height: 16px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            margin-bottom: 5px;
            position: relative;
        }
        .stat-bar-fill {
            height: 100%;
            transition: width 0.3s;
        }
        .stat-bar-fill.health {
            background: linear-gradient(90deg, #8b0000, #ff4444);
        }
        .stat-bar-fill.oxygen {
            background: linear-gradient(90deg, #0044aa, #44aaff);
        }
        .stat-label {
            position: absolute;
            left: 5px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }
        /* Main Menu */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a20 0%, #1a1a3a 50%, #0a0a20 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 100;
        }
        #main-menu.hidden {
            display: none;
        }
        #main-menu h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100,150,255,0.5);
            letter-spacing: 4px;
        }
        #main-menu h2 {
            font-size: 18px;
            color: #888;
            margin-bottom: 50px;
            font-weight: normal;
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-btn {
            padding: 15px 60px;
            font-size: 18px;
            background: rgba(50,50,100,0.6);
            border: 2px solid rgba(100,150,255,0.5);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }
        .menu-btn:hover {
            background: rgba(80,80,160,0.8);
            border-color: rgba(150,180,255,0.8);
            box-shadow: 0 0 20px rgba(100,150,255,0.4);
        }
        /* Build Menu */
        #build-menu {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(20,20,40,0.9);
            border: 2px solid rgba(100,150,255,0.5);
            padding: 15px;
            display: none;
            pointer-events: auto;
        }
        #build-menu.active {
            display: block;
        }
        #build-menu h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .build-category {
            margin-bottom: 10px;
        }
        .build-category-title {
            color: #88aaff;
            font-size: 12px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .build-items {
            display: grid;
            grid-template-columns: repeat(4, 40px);
            gap: 5px;
        }
        .build-item {
            width: 40px;
            height: 40px;
            background: rgba(60,60,100,0.6);
            border: 1px solid rgba(100,150,255,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #aaa;
            transition: all 0.2s;
        }
        .build-item:hover {
            background: rgba(80,80,140,0.8);
            border-color: rgba(150,180,255,0.6);
        }
        .build-item.selected {
            border-color: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        /* Loading Screen */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            z-index: 200;
        }
        #loading-screen.hidden {
            display: none;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(100,150,255,0.3);
            border-top-color: rgba(100,150,255,1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Notifications */
        #notifications {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 50;
        }
        .notification {
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            animation: fadeInOut 3s ease-in-out forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="loading-spinner"></div>
            <div id="loading-text">正在初始化...</div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="hidden">
            <h1>星尘牧歌</h1>
            <h2>STARDUST NOMAD</h2>
            <div class="menu-buttons">
                <button class="menu-btn" id="btn-new-game">新游戏</button>
                <button class="menu-btn" id="btn-continue">继续游戏</button>
                <button class="menu-btn" id="btn-settings">设置</button>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-top-left">
                <div class="stat-bar">
                    <div class="stat-bar-fill health" id="health-bar" style="width: 100%"></div>
                    <span class="stat-label">生命</span>
                </div>
                <div class="stat-bar">
                    <div class="stat-bar-fill oxygen" id="oxygen-bar" style="width: 100%"></div>
                    <span class="stat-label">氧气</span>
                </div>
            </div>
            <div class="hud-top-right">
                <div id="position-display">X: 0 Y: 0 Z: 0</div>
                <div id="chunk-display">Chunk: 0, 0</div>
            </div>
            <div class="crosshair"></div>
            <div class="hud-bottom">
                <div class="hotbar" id="hotbar"></div>
                <div id="mode-display" style="margin-top: 10px; font-size: 14px;">行走模式</div>
            </div>
        </div>

        <!-- Build Menu -->
        <div id="build-menu">
            <h3>建造菜单 [B]</h3>
            <div id="build-categories"></div>
        </div>

        <!-- Notifications -->
        <div id="notifications"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
